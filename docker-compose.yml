version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: universal_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  mysql:
    image: mysql:8
    container_name: universal_mysql
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  mongodb:
    image: mongo
    container_name: universal_mongo
    restart: always
    env_file:
      - .env
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongodb/init.js:/docker-entrypoint-initdb.d/init.js

  redis:
    image: redis:7
    container_name: universal_redis
    restart: always
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: universal_adminer
    restart: always
    ports:
      - "${ADMINER_PORT}:8080"

  nginx:
    image: nginx
    container_name: universal_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf

volumes:
  postgres_data:
  mysql_data:
  mongo_data:
